<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#01afab" />
    <meta name="description" content="Predict liver weight from preoperative measurements using machine learning" />
    <link rel="manifest" href="/manifest.json" />
    <title>Livery.one — Liver Weight Prediction</title>
    <script>
      // Set the theme before paint so there is no flash of the wrong mode.
      (function () {
        var t = localStorage.getItem('livery-theme');
        if (t !== 'dark' && t !== 'light') {
          t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
